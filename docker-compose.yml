version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudladder
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_HOST_PORT:-3101}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/cloudladder.db
      - JWT_SECRET=${JWT_SECRET:-cloudladder-prod-jwt-secret-2026}
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist uploads
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
